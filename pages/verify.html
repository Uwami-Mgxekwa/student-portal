<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Verification - GCC</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .verify-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .verify-header {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .verify-header img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .verify-header-text h2 {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
    }

    .verify-header-text p {
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
    }

    .verify-body {
      padding: 24px;
    }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Valid state */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .status-valid {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .status-invalid {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .student-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e2e8f0;
      display: block;
      margin: 0 auto 16px;
    }

    .student-name {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .student-id-display {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .info-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #f8fafc;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .info-label {
      color: #666;
      font-weight: 500;
    }

    .info-value {
      color: #1a1a2e;
      font-weight: 600;
      text-align: right;
    }

    .year-badge {
      display: inline-block;
      background: rgba(255,165,0,0.15);
      border: 1px solid orange;
      color: #b45309;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .verify-footer {
      padding: 14px 24px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      text-align: center;
      font-size: 0.7rem;
      color: #999;
    }

    /* Error state */
    .error-state {
      text-align: center;
      padding: 40px 20px;
    }

    .error-state i {
      font-size: 3rem;
      color: #ef4444;
      margin-bottom: 12px;
    }

    .error-state h3 {
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .error-state p {
      color: #666;
      font-size: 0.85rem;
    }

    .powered-by {
      margin-top: 16px;
      font-size: 0.7rem;
      color: #aaa;
      text-align: center;
    }

    .powered-by a {
      color: #aaa;
      text-decoration: none;
    }

    .powered-by a:hover { color: #666; }
  </style>
</head>
<body>

  <div class="verify-card" id="verifyCard">
    <div class="verify-header">
      <img src="../assets/logo.png" alt="GCC Logo" />
      <div class="verify-header-text">
        <h2>Gauteng City College</h2>
        <p>Student Verification</p>
      </div>
    </div>
    <div class="verify-body" id="verifyBody">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Verifying student...</p>
      </div>
    </div>
    <div class="verify-footer">
      Scanned at <span id="scanTime"></span> &bull; GCC Student Portal
    </div>
  </div>

  <p class="powered-by">Powered by <a href="https://brelinx.com" target="_blank">Brelinx</a></p>

  <!-- Debug overlay — remove after fixing -->
  <div id="debugLog" style="display:none; position:fixed; bottom:0; left:0; right:0; max-height:40vh; overflow-y:auto; background:rgba(0,0,0,0.85); color:#0f0; font-size:11px; font-family:monospace; padding:8px; z-index:9999;"></div>

  <script>
    // Capture all console errors to screen for mobile debugging
    const debugEl = document.getElementById('debugLog');
    const showDebug = new URLSearchParams(window.location.search).get('debug') === '1';
    if (showDebug) debugEl.style.display = 'block';

    function dbg(msg, color) {
      if (!showDebug) return;
      const line = document.createElement('div');
      line.style.color = color || '#0f0';
      line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      debugEl.appendChild(line);
      debugEl.scrollTop = debugEl.scrollHeight;
    }

    window.onerror = (msg, src, line) => dbg('ERROR: ' + msg + ' (' + src + ':' + line + ')', '#f55');
    window.onunhandledrejection = (e) => dbg('UNHANDLED: ' + (e.reason?.message || e.reason), '#f55');
    const APP_ID     = 'SxhMBsTSB2BasoZQecw9KyixCwyDMK8cyQwx9T7f';
    const REST_KEY   = '06EPenV9Yn39SoxeJ06EbZxikBVl98NId12REFhI';
    const CLIENT_KEY = 's7cPCGuR8nOksoVPMg4ClH0ImWZd9YmohjVG6J9a';
    const API_BASE   = 'https://parseapi.back4app.com';

    // Show scan time
    document.getElementById('scanTime').innerText = new Date().toLocaleString('en-ZA');

    const params    = new URLSearchParams(window.location.search);
    const studentId = params.get('id');

    const headers = {
      'X-Parse-Application-Id': APP_ID,
      'X-Parse-REST-API-Key':   REST_KEY,
      'X-Parse-Client-Key':     CLIENT_KEY,
      'Content-Type':           'application/json'
    };

    const renderValid = (student, info) => {
      const year = new Date().getFullYear();
      // Use absolute URL for profile image since this page can be opened from any origin
      const fallback = 'https://uwami-mgxekwa.github.io/student-portal/assets/fallback-icon.png';
      const photo = student.profile_image || fallback;

      document.getElementById('verifyBody').innerHTML = `
        <div class="status-badge status-valid">
          <i class="fas fa-check-circle"></i>
          Verified Enrolled Student
        </div>
        <img class="student-photo"
          src="${photo}"
          alt="Student Photo"
          onerror="this.src='${fallback}'"
        />
        <h2 class="student-name">${student.first_name} ${student.last_name}</h2>
        <p class="student-id-display">Student ID: ${student.student_id}</p>
        <div class="info-grid">
          <div class="info-row">
            <span class="info-label">Course</span>
            <span class="info-value">${info?.course || 'N/A'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Faculty</span>
            <span class="info-value">${info?.faculty || 'N/A'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Year of Study</span>
            <span class="info-value">Year ${info?.year || 'N/A'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Campus</span>
            <span class="info-value">${info?.campus || 'N/A'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Academic Year</span>
            <span class="info-value"><span class="year-badge">${year}</span></span>
          </div>
        </div>
      `;
    };

    const renderError = (message) => {
      document.getElementById('verifyBody').innerHTML = `
        <div class="error-state">
          <i class="fas fa-times-circle"></i>
          <h3>Verification Failed</h3>
          <p>${message}</p>
        </div>
      `;
    };

    (async function verify() {
      if (!studentId) {
        renderError('No student ID provided. Please scan a valid GCC student card.');
        return;
      }

      try {
        dbg('Querying _User for student_id: ' + studentId);

        // Query _User via REST API — use /classes/_User not /users for where queries
        const userWhere = encodeURIComponent(JSON.stringify({ student_id: studentId }));
        const userRes   = await fetch(
          `${API_BASE}/1/classes/_User?where=${userWhere}&limit=1`,
          { headers }
        );

        dbg('User response status: ' + userRes.status);

        let student = null;

        if (userRes.ok) {
          const userData = await userRes.json();
          dbg('User results count: ' + (userData.results?.length || 0));
          const user = userData.results && userData.results[0];
          if (user) {
            student = {
              student_id:    user.student_id,
              first_name:    user.first_name,
              last_name:     user.last_name,
              profile_image: user.profile_image || null
            };
            dbg('Student found via _User: ' + student.first_name + ' ' + student.last_name);
          }
        } else {
          dbg('_User query failed (' + userRes.status + '), will try StudentInfo fallback', '#ff0');
        }

        // Fetch StudentInfo for academic details (also used as fallback if _User blocked)
        const infoWhere = encodeURIComponent(JSON.stringify({ student_id: studentId }));
        const infoRes   = await fetch(
          `${API_BASE}/1/classes/StudentInfo?where=${infoWhere}&limit=1`,
          { headers }
        );

        dbg('StudentInfo response status: ' + infoRes.status);

        let info = null;
        if (infoRes.ok) {
          const infoData = await infoRes.json();
          const infoObj  = infoData.results && infoData.results[0];
          if (infoObj) {
            info = {
              course:  infoObj.course,
              faculty: infoObj.faculty,
              year:    infoObj.year,
              campus:  infoObj.campus
            };
            dbg('StudentInfo found: course=' + info.course + ' year=' + info.year);

            // If _User was blocked, build a minimal student object from StudentInfo
            if (!student) {
              student = {
                student_id:    infoObj.student_id,
                first_name:    infoObj.first_name || 'Student',
                last_name:     infoObj.last_name  || infoObj.student_id,
                profile_image: null
              };
              dbg('Built student from StudentInfo fallback', '#ff0');
            }
          } else {
            dbg('No StudentInfo record found', '#ff0');
          }
        }

        if (!student) {
          renderError('Student not found. This card may be invalid or expired.');
          return;
        }

        renderValid(student, info);

      } catch (err) {
        console.error('Verification error:', err);
        dbg('CATCH: ' + err.message, '#f55');
        renderError('Unable to connect to the database. Please try again.');
      }
    })();
  </script>
</body>
</html>
